<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#A6D1E6">
<title>SearchEasy · AI导购</title>
<style>
  :root {
    --blue-light: #C1E1F7; --blue: #A6D1E6; --blue-mid: #7EB8DA; --blue-dark: #5A9EC9;
    --pink: #FFB6C1; --pink-light: #FFD6DC;
    --bg: #FFFFFF; --surface: #F8FAFC;
    --text: #334155; --text2: #64748B; --text3: #94A3B8;
    --border: #D1E8F0;
    --radius-sm: 10px; --radius: 16px; --radius-lg: 24px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06); --shadow: 0 4px 20px rgba(126,184,218,.12);
    --shadow-lg: 0 12px 36px rgba(126,184,218,.16);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,-apple-system,sans-serif;
    background: #fff;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(166,209,230,.12) 1px, transparent 0),
      radial-gradient(circle at 1px 1px, rgba(255,182,193,.08) 1px, transparent 0);
    background-size: 40px 40px, 80px 80px;
    background-position: 0 0, 20px 20px;
    color: var(--text); min-height: 100dvh;
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .hdr {
    background: linear-gradient(135deg, #B8D9EE 0%, #A6D1E6 30%, #C1E1F7 60%, #FFD6DC 100%);
    padding: 14px 20px; color: #fff; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 2px 20px rgba(126,184,218,.2);
    position: relative; overflow: hidden;
  }
  .hdr::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 50%, rgba(255,255,255,.15) 0%, transparent 60%),
                radial-gradient(circle at 70% 30%, rgba(255,182,193,.12) 0%, transparent 50%);
  }
  .hdr-wrap { position: relative; z-index: 1; display: flex; align-items: center; gap: 10px; }
  .hdr-icon {
    width: 38px; height: 38px;
    background: rgba(255,255,255,.25); backdrop-filter: blur(6px);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; border: 1px solid rgba(255,255,255,.3);
  }
  .hdr h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -.01em; }
  .hdr-dot { width: 7px; height: 7px; border-radius: 50%; background: #a3e635; box-shadow: 0 0 8px rgba(163,230,53,.5); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

  /* ── Chat ── */
  .chat {
    flex: 1; overflow-y: auto; padding: 20px 14px 8px;
    display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome */
  .wlcm { text-align: center; padding: 30px 16px 12px; }
  .wlcm-icon {
    width: 72px; height: 72px; margin: 0 auto 16px;
    background: linear-gradient(135deg, #A6D1E6, #FFB6C1);
    border-radius: 22px; display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; color: #fff; box-shadow: 0 10px 36px rgba(166,209,230,.25);
    border: 2px solid rgba(255,255,255,.4);
  }
  .wlcm h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 4px; color: var(--text); }
  .wlcm p { font-size: .85rem; color: var(--text2); max-width: 300px; margin: 0 auto; line-height: 1.7; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 18px; }
  .chip {
    background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 22px;
    padding: 10px 18px; font-size: .8rem; color: var(--text); cursor: pointer;
    transition: all .25s; white-space: nowrap;
    box-shadow: var(--shadow-sm);
  }
  .chip:hover {
    border-color: var(--blue-mid); color: var(--blue-dark);
    background: rgba(255,255,255,.95); box-shadow: var(--shadow);
    transform: translateY(-2px);
  }
  .chip:active { transform: scale(.96); }

  /* Messages */
  .msg { display: flex; flex-direction: column; max-width: 85%; animation: in .4s cubic-bezier(.22,1,.36,1); }
  @keyframes in { from{ opacity:0; transform:translateY(14px) } to{ opacity:1; transform:translateY(0) } }
  .msg.u { align-self: flex-end; }
  .msg.a { align-self: flex-start; }
  .bbl {
    padding: 14px 18px; border-radius: 20px; font-size: .88rem; line-height: 1.65;
    word-break: break-word;
  }
  .msg.u .bbl {
    background: linear-gradient(135deg, #A6D1E6, #7EB8DA); color: #fff;
    border-bottom-right-radius: 6px; box-shadow: 0 3px 12px rgba(126,184,218,.2);
  }
  .msg.a .bbl {
    background: rgba(255,255,255,.75); backdrop-filter: blur(12px);
    border: 1px solid rgba(209,232,240,.6); border-bottom-left-radius: 6px;
    box-shadow: var(--shadow-sm);
  }
  .msg-time { font-size: .66rem; color: var(--text3); margin-top: 4px; padding: 0 4px; }
  .msg.u .msg-time { text-align: right; }

  /* Typing */
  .typing { display: flex; gap: 5px; padding: 14px 18px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--blue-mid); animation: bounce 1.4s infinite ease-in-out both; opacity: .5; }
  .typing span:nth-child(1){animation-delay:-.32s} .typing span:nth-child(2){animation-delay:-.16s}
  @keyframes bounce { 0%,80%,100%{transform:scale(.4);opacity:.3} 40%{transform:scale(1);opacity:1} }

  /* Cards */
  .pcs { display: flex; gap: 12px; margin-top: 14px; overflow-x: auto; padding-bottom: 6px; scroll-snap-type: x mandatory; }
  .pcs::-webkit-scrollbar { height: 4px; }
  .pcs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .pc {
    min-width: 175px; max-width: 195px; flex-shrink: 0; scroll-snap-align: start;
    background: rgba(255,255,255,.8); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: all .3s;
  }
  .pc:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--pink); }
  .pc-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f1f5f9; }
  .pc-body { padding: 12px; }
  .pc-name { font-size: .82rem; font-weight: 600; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  .pc-desc { font-size: .7rem; color: var(--text2); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }
  .pc-foot { display: flex; justify-content: space-between; align-items: center; }
  .pc-price { font-size: 1rem; font-weight: 700; color: #E8590C; }
  .pc-tag { font-size: .62rem; color: var(--blue-dark); background: rgba(166,209,230,.2); border-radius: 8px; padding: 3px 8px; font-weight: 500; }

  /* Input */
  .inp-area { flex-shrink: 0; padding: 10px 14px 18px; background: linear-gradient(0deg, rgba(255,255,255,.95) 60%, transparent); position: sticky; bottom: 0; }
  .inp-row {
    display: flex; gap: 8px; align-items: center;
    background: rgba(255,255,255,.85); backdrop-filter: blur(16px);
    border: 1.5px solid var(--border); border-radius: 28px;
    padding: 5px 5px 5px 18px; box-shadow: var(--shadow); transition: all .3s;
  }
  .inp-row:focus-within { border-color: var(--blue-mid); box-shadow: var(--shadow-lg); }
  .inp-row input {
    flex: 1; border: none; outline: none; font-size: .9rem; font-family: inherit;
    background: transparent; padding: 10px 0; color: var(--text);
  }
  .inp-row input::placeholder { color: var(--text3); }
  .btn {
    width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; transition: all .25s;
  }
  .btn-send { background: linear-gradient(135deg, #A6D1E6, #7EB8DA); color: #fff; }
  .btn-send:hover { transform: scale(1.06); box-shadow: 0 6px 20px rgba(126,184,218,.35); }
  .btn-send:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-cam {
    background: rgba(255,255,255,.9); color: var(--blue-mid);
    border: 1.5px solid var(--border);
  }
  .btn-cam:hover { border-color: var(--blue-mid); background: #f0f8fc; }

  .st { text-align: center; font-size: .64rem; color: var(--text3); margin-top: 6px; letter-spacing: .02em; }

  @media (max-width: 480px) {
    .hdr { padding: 10px 12px; } .hdr h1 { font-size: .95rem; }
    .msg { max-width: 92%; } .bbl { font-size: .82rem; padding: 12px 14px; }
    .pc { min-width: 150px; max-width: 165px; }
    .chip { font-size: .72rem; padding: 7px 12px; }
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-wrap">
    <div class="hdr-dot"></div>
    <div class="hdr-icon">🛍</div>
    <h1>SearchEasy · AI导购</h1>
  </div>
</div>

<div class="chat" id="chat">
  <div class="wlcm" id="wlcm">
    <div class="wlcm-icon">✨</div>
    <h2>你好，我是你的AI导购</h2>
    <p>拍照搜同款，打字聊需求<br>帮你找到心仪好物</p>
    <div class="chips">
      <span class="chip" onclick="send(this.textContent)">🛍 适合夏天穿的连衣裙</span>
      <span class="chip" onclick="send(this.textContent)">🎁 送男朋友的生日礼物</span>
      <span class="chip" onclick="send(this.textContent)">🥗 健身减脂的健康零食</span>
      <span class="chip" onclick="send(this.textContent)">👔 见家长穿什么合适</span>
    </div>
  </div>
</div>

<div class="inp-area">
  <div class="inp-row">
    <button class="btn btn-cam" onclick="document.getElementById('fu').click()" title="拍照">📷</button>
    <input type="text" id="inp" placeholder="描述你的购物需求..." autocomplete="off" maxlength="500">
    <input type="file" id="fu" accept="image/*" hidden onchange="upload(this)">
    <button class="btn btn-send" id="sendBtn" onclick="send()">➤</button>
  </div>
  <div class="st" id="st">已连接</div>
</div>

<script>
const API='https://yunyunwaifu-flora-ai-shop-agent.hf.space';
let busy=false;
const $=id=>document.getElementById(id);
function t(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
function scroll(){const c=$('chat');c.scrollTo({top:c.scrollHeight,behavior:'smooth'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function add(role,html){
  const el=document.createElement('div');
  el.className='msg '+(role==='user'?'u':'a');
  el.innerHTML=html; $('chat').appendChild(el); scroll();
}

function usr(txt){ add('user',`<div class="bbl">${esc(txt)}</div><div class="msg-time">${t()}</div>`) }
function load(){
  const el=document.createElement('div'); el.className='msg a'; el.id='load';
  el.innerHTML='<div class="bbl"><div class="typing"><span></span><span></span><span></span></div></div>';
  $('chat').appendChild(el); scroll();
}
function rml(){ const el=document.getElementById('load'); if(el) el.remove(); }

function ai(reply,products){
  let cards='';
  if(products&&products.length){
    cards='<div class="pcs">';
    products.forEach(p=>{
      const raw=p.image_url||'';
      const img=raw.startsWith('http')?raw:raw.startsWith('/')?API+raw:'https://placehold.co/400/EFF2FA/6B7280?text='+encodeURIComponent(p.name||'商品');
      cards+=`<div class="pc"><img class="pc-img" src="${esc(img)}" alt="${esc(p.name)}" loading="lazy" onerror="this.style.display='none'">
        <div class="pc-body">
          <div class="pc-name">${esc(p.name)}</div>
          <div class="pc-desc">${esc(p.description)}</div>
          <div class="pc-foot">
            <span class="pc-price">¥${p.price||'暂无'}</span>
            ${p.score?`<span class="pc-tag">${(p.score*100).toFixed(0)}%</span>`:''}
          </div>
        </div></div>`;
    });
    cards+='</div>';
  }
  add('ai',`<div class="bbl">${esc(reply)}${cards}</div><div class="msg-time">${t()}</div>`);
}

async function send(text){
  const msg=(text||$('inp').value).trim(); if(!msg||busy) return;
  $('wlcm').style.display='none'; busy=true; $('sendBtn').disabled=true; $('inp').value='';
  usr(msg); load();
  try {
    const t0=performance.now();
    const r=await fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const d=await r.json(); rml();
    if(r.ok){ ai(d.reply,d.products||[]); $('st').textContent=(d.source==='ai'?'AI ':'')+'推荐 · '+(d.elapsed_ms||Math.round(performance.now()-t0))+'ms'; }
    else { ai('抱歉，出了点问题：'+(d.detail||'请重试'),[]); }
  } catch(e) { rml(); ai('网络连接失败，请确认后端已启动',[]); $('st').textContent='未连接'; }
  busy=false; $('sendBtn').disabled=false; $('inp').focus();
}

async function upload(inp){
  const f=inp.files[0]; if(!f||busy) return;
  $('wlcm').style.display='none'; busy=true;
  usr('📷 '+f.name); load();
  try {
    const fd=new FormData(); fd.append('file',f);
    const t0=performance.now();
    const r=await fetch(API+'/api/agent/recommend',{method:'POST',body:fd});
    const d=await r.json(); rml();
    if(r.ok&&d.recommendation_note){
      const ps=(d.products||[]).map(p=>({
        name:p.label||p.image_path.split('/').pop(),
        description:'相似度 '+(p.similarity_score*100).toFixed(1)+'%',
        image_url:p.image_url||'', score:p.similarity_score, price:0
      }));
      ai(d.recommendation_note,ps); $('st').textContent='图像搜索 · '+Math.round(performance.now()-t0)+'ms';
    } else { ai('图片搜索失败',[]); }
  } catch(e) { rml(); ai('网络连接失败',[]); }
  busy=false; inp.value='';
}

$('inp').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
$('inp').focus();

(async function(){
  try { const r=await fetch(API+'/api/health'); const d=await r.json(); if(d.status==='ok') $('st').textContent='已连接 · '+d.engine.total_images+' 件商品在线'; }
  catch(e) { $('st').textContent='离线模式'; }
})();
</script>
</body>
</html>
