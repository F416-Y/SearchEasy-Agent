<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#6366f1">
<title>SearchEasy · AI导购</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f3ff; --surface:#fff; --accent:#6366f1; --accent-light:#818cf8;
    --text:#1e293b; --text2:#64748b; --text3:#94a3b8;
    --pink:#f472b6; --rose:#fb7185; --border:#e2e8f0; --border-light:#f1f5f9;
    --shadow-sm:0 1px 3px rgba(0,0,0,.04); --shadow:0 4px 24px rgba(99,102,241,.08);
    --shadow-lg:0 12px 40px rgba(99,102,241,.12);
    --radius:16px; --radius-sm:12px; --radius-lg:24px;
  }
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
    background:linear-gradient(165deg,#f5f3ff 0%,#fdf2f8 30%,#f8fafc 60%,#eef2ff 100%);
    color:var(--text);min-height:100dvh;display:flex;flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  /* Header */
  .header{
    background:linear-gradient(135deg,#4f46e5 0%,#6366f1 40%,#818cf8 100%);
    padding:14px 20px;color:#fff;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 2px 20px rgba(99,102,241,.25);
  }
  .header-icon{
    width:36px;height:36px;background:rgba(255,255,255,.18);border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.2rem;
    backdrop-filter:blur(4px);
  }
  .header h1{font-size:1.15rem;font-weight:600;letter-spacing:-.01em;}
  .header-dot{width:7px;height:7px;border-radius:50%;background:#a3e635;box-shadow:0 0 8px rgba(163,230,53,.5);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

  /* Chat */
  .chat-wrap{
    flex:1;overflow-y:auto;padding:20px 16px 8px;
    display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;
  }
  .chat-wrap::-webkit-scrollbar{width:4px}
  .chat-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  /* Welcome */
  .welcome{text-align:center;padding:24px 16px 8px}
  .welcome-icon{
    width:64px;height:64px;margin:0 auto 16px;
    background:linear-gradient(135deg,#6366f1,#a78bfa);border-radius:20px;
    display:flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;
    box-shadow:0 8px 32px rgba(99,102,241,.2);
  }
  .welcome h2{font-family:'Noto Serif SC',serif;font-size:1.3rem;font-weight:600;margin-bottom:4px;color:var(--text)}
  .welcome p{font-size:.85rem;color:var(--text2);max-width:300px;margin:0 auto;line-height:1.6}
  .quick-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px}
  .chip{
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:9px 16px;font-size:.78rem;color:var(--text);cursor:pointer;
    transition:all .2s;white-space:nowrap;box-shadow:var(--shadow-sm);
  }
  .chip:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
  .chip:active{transform:scale(.96)}

  /* Messages */
  .msg{display:flex;flex-direction:column;max-width:86%;animation:msgIn .4s cubic-bezier(.22,1,.36,1)}
  @keyframes msgIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-self:flex-end}
  .msg.ai{align-self:flex-start}
  .bubble{
    padding:14px 18px;border-radius:20px;font-size:.88rem;line-height:1.6;word-break:break-word;
  }
  .msg.user .bubble{
    background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;
    border-bottom-right-radius:6px;
  }
  .msg.ai .bubble{
    background:var(--surface);border:1px solid var(--border-light);
    border-bottom-left-radius:6px;box-shadow:var(--shadow-sm);
  }
  .msg-time{font-size:.68rem;color:var(--text3);margin-top:4px;padding:0 4px}
  .msg.user .msg-time{text-align:right}

  /* Typing */
  .typing{display:flex;gap:5px;padding:14px 18px}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite ease-in-out both;opacity:.5}
  .typing span:nth-child(1){animation-delay:-.32s}.typing span:nth-child(2){animation-delay:-.16s}
  @keyframes bounce{0%,80%,100%{transform:scale(.4);opacity:.3}40%{transform:scale(1);opacity:1}}

  /* Product cards */
  .pcards{display:flex;gap:12px;margin-top:12px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .pcards::-webkit-scrollbar{height:4px}
  .pcards::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .pcard{
    min-width:170px;max-width:190px;flex-shrink:0;scroll-snap-align:start;
    background:linear-gradient(180deg,#fafbff 0%,#f8fafc 100%);
    border:1px solid var(--border-light);border-radius:var(--radius-sm);
    overflow:hidden;transition:all .25s;
  }
  .pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#ddd6fe}
  .pcard img{width:100%;aspect-ratio:1;object-fit:cover;background:#f1f5f9}
  .pcard-body{padding:10px 12px}
  .pcard-name{font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pcard-desc{font-size:.7rem;color:var(--text2);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
  .pcard-tag{font-size:.65rem;color:var(--accent);background:linear-gradient(135deg,#eef2ff,#ede9fe);border-radius:8px;padding:4px 8px;display:inline-block;font-weight:500}

  /* Input */
  .input-area{flex-shrink:0;padding:10px 14px 18px;background:linear-gradient(0deg,var(--bg) 60%,transparent);position:sticky;bottom:0}
  .input-row{
    display:flex;gap:8px;align-items:center;
    background:var(--surface);border:1.5px solid var(--border);border-radius:28px;
    padding:5px 5px 5px 18px;box-shadow:var(--shadow);transition:all .25s;
  }
  .input-row:focus-within{border-color:var(--accent);box-shadow:var(--shadow-lg)}
  .input-row input{
    flex:1;border:none;outline:none;font-size:.9rem;font-family:inherit;background:transparent;
    padding:10px 0;color:var(--text);
  }
  .input-row input::placeholder{color:var(--text3)}
  .btn{
    width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;
  }
  .btn-send{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff}
  .btn-send:hover{transform:scale(1.06);box-shadow:0 6px 20px rgba(99,102,241,.35)}
  .btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-cam{background:var(--surface);color:var(--accent);border:1.5px solid var(--border)}
  .btn-cam:hover{border-color:var(--accent);background:#faf5ff}

  .status{text-align:center;font-size:.65rem;color:var(--text3);margin-top:6px;letter-spacing:.02em}

  @media(max-width:480px){
    .header{padding:10px 14px}.header h1{font-size:1rem}
    .msg{max-width:92%}.bubble{font-size:.82rem;padding:12px 14px}
    .pcard{min-width:145px;max-width:160px}
    .chip{font-size:.72rem;padding:7px 12px}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-dot"></div>
  <div class="header-icon">🛍</div>
  <h1>SearchEasy · AI导购</h1>
</div>

<div class="chat-wrap" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✨</div>
    <h2>你好，我是你的AI导购</h2>
    <p>拍照搜同款，打字聊需求 — 帮你找到心仪好物</p>
    <div class="quick-chips">
      <span class="chip" onclick="send(this.textContent)">🛍 适合夏天穿的连衣裙</span>
      <span class="chip" onclick="send(this.textContent)">🎁 送男朋友的生日礼物</span>
      <span class="chip" onclick="send(this.textContent)">🥗 健身减脂的健康零食</span>
      <span class="chip" onclick="send(this.textContent)">👔 见家长穿什么合适</span>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <button class="btn btn-cam" onclick="document.getElementById('fu').click()" title="拍照搜">📷</button>
    <input type="text" id="inp" placeholder="描述你的购物需求..." autocomplete="off" maxlength="500">
    <input type="file" id="fu" accept="image/*" hidden onchange="upload(this)">
    <button class="btn btn-send" id="sendBtn" onclick="send()">➤</button>
  </div>
  <div class="status" id="st">已连接</div>
</div>

<script>
const API='https://yunyunwaifu-flora-ai-shop-agent.hf.space';
let busy=false;
const $=id=>document.getElementById(id);
function t(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
function scroll(){const c=$('chat');c.scrollTo({top:c.scrollHeight,behavior:'smooth'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function add(role,html){
  const el=document.createElement('div');el.className='msg '+role;el.innerHTML=html;
  $('chat').appendChild(el);scroll();
}

function userMsg(text){add('user',`<div class="bubble">${esc(text)}</div><div class="msg-time">${t()}</div>`)}

function loadMsg(){
  const el=document.createElement('div');el.className='msg ai';el.id='load';
  el.innerHTML='<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  $('chat').appendChild(el);scroll();
}

function rmL(){const el=document.getElementById('load');if(el)el.remove()}

function aiMsg(reply,products){
  let cards='';
  if(products&&products.length){
    cards='<div class="pcards">';
    products.forEach(p=>{
      const img=p.image_url||'https://placehold.co/400/EFF2FA/6B7280?text=商品';
      cards+=`<div class="pcard">
        <img src="${esc(img)}" alt="${esc(p.name)}" loading="lazy" onerror="this.src='https://placehold.co/400/EFF2FA/6B7280?text=商品'">
        <div class="pcard-body">
          <div class="pcard-name">${esc(p.name)}</div>
          <div class="pcard-desc">${esc(p.description)}</div>
          ${p.score?`<div class="pcard-tag">匹配 ${(p.score*100).toFixed(0)}%</div>`:''}
        </div>
      </div>`;
    });
    cards+='</div>';
  }
  add('ai',`<div class="bubble">${esc(reply)}${cards}</div><div class="msg-time">${t()}</div>`);
}

async function send(text){
  const msg=(text||$('inp').value).trim();
  if(!msg||busy)return;
  $('welcome').style.display='none';
  busy=true;$('sendBtn').disabled=true;$('inp').value='';
  userMsg(msg);loadMsg();
  try{
    const t0=performance.now();
    const r=await fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const d=await r.json();rmL();
    if(r.ok){aiMsg(d.reply,d.products||[]);$('st').textContent=(d.source==='ai'?'AI 推荐':'离线匹配')+' · '+(d.elapsed_ms||Math.round(performance.now()-t0))+'ms'}
    else{aiMsg('抱歉，出了点问题：'+(d.detail||'请重试'),[])}
  }catch(e){rmL();aiMsg('网络连接失败，请确认后端已启动',[]);$('st').textContent='未连接'}
  busy=false;$('sendBtn').disabled=false;$('inp').focus();
}

async function upload(inp){
  const f=inp.files[0];if(!f||busy)return;
  $('welcome').style.display='none';busy=true;
  userMsg('📷 '+f.name);loadMsg();
  try{
    const fd=new FormData();fd.append('file',f);
    const t0=performance.now();
    const r=await fetch(API+'/api/agent/recommend',{method:'POST',body:fd});
    const d=await r.json();rmL();
    if(r.ok&&d.recommendation_note){
      const ps=(d.products||[]).map(p=>({
        name:p.label||p.image_path.split('/').pop(),
        description:'相似度 '+(p.similarity_score*100).toFixed(1)+'%',
        image_url:p.image_url||'',score:p.similarity_score
      }));
      aiMsg(d.recommendation_note,ps);$('st').textContent='图像搜索 · '+Math.round(performance.now()-t0)+'ms';
    }else{aiMsg('图片搜索失败',[])}
  }catch(e){rmL();aiMsg('网络连接失败',[])}
  busy=false;inp.value='';
}

$('inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
$('inp').focus();

(async function(){
  try{const r=await fetch(API+'/api/health');const d=await r.json();if(d.status==='ok')$('st').textContent='已连接 · '+d.engine.total_images+' 件商品在线'}
  catch(e){$('st').textContent='离线模式'}
})();
</script>
</body>
</html>
