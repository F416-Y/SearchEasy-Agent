<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SearchEasy · AI导购</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #4F6EF7; --primary-dark: #3B54D4; --bg: #F0F4FF;
    --surface: #FFFFFF; --text: #1A1D2E; --text-secondary: #6B7280;
    --text-muted: #9CA3AF; --bubble-user: #EEF1FF; --bubble-ai: #FFFFFF;
    --border: #E5E7F0; --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,.06); --shadow-lg: 0 12px 32px rgba(79,110,247,.12);
    --radius-sm: 12px; --radius-md: 18px; --radius-lg: 24px;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100dvh;
    display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
  }
  .header {
    background: linear-gradient(135deg, #4F6EF7 0%, #6C8CFF 100%);
    padding: 12px 20px; text-align: center; color: #fff; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .header h1 { font-size: 1.2rem; font-weight: 700; }
  .header .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ADE80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  .chat-container { flex:1; overflow-y:auto; padding:16px 12px 8px; display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth; }
  .welcome { text-align:center; padding:20px 16px 8px; }
  .welcome-icon { width:56px;height:56px; background:linear-gradient(135deg,#4F6EF7,#6C8CFF); border-radius:20px; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-size:28px; color:#fff; box-shadow:var(--shadow-lg); }
  .welcome h3 { font-size:1.05rem; font-weight:600; margin-bottom:4px; }
  .welcome p { font-size:.82rem; color:var(--text-secondary); max-width:280px; margin:0 auto; }
  .quick-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:0 4px; }
  .quick-chip { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 14px; font-size:.78rem; color:var(--text); cursor:pointer; transition:all .2s; white-space:nowrap; }
  .quick-chip:hover { border-color:var(--primary); color:var(--primary); box-shadow:var(--shadow-sm); }
  .quick-chip:active { transform:scale(.96); }

  .message { display:flex; flex-direction:column; max-width:88%; animation: fadeInUp .35s ease; }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self:flex-end; }
  .message.assistant { align-self:flex-start; }
  .bubble { padding:12px 16px; border-radius:var(--radius-md); font-size:.88rem; line-height:1.55; word-break:break-word; }
  .message.user .bubble { background:var(--bubble-user); border-bottom-right-radius:6px; }
  .message.assistant .bubble { background:var(--bubble-ai); border:1px solid var(--border); border-bottom-left-radius:6px; box-shadow:var(--shadow-sm); }
  .message-time { font-size:.68rem; color:var(--text-muted); margin-top:4px; padding:0 4px; }
  .message.user .message-time { text-align:right; }

  .products-row { display:flex; gap:12px; margin-top:12px; overflow-x:auto; padding-bottom:4px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
  .products-row::-webkit-scrollbar { height:4px; }
  .products-row::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .product-card { min-width:160px; max-width:180px; flex-shrink:0; background:#FAFBFF; border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; scroll-snap-align:start; transition:transform .2s,box-shadow .2s; }
  .product-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); }
  .product-card img { width:100%; aspect-ratio:1; object-fit:cover; background:#EFF2FA; }
  .product-info { padding:10px 12px; }
  .product-name { font-size:.8rem; font-weight:600; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .product-desc { font-size:.68rem; color:var(--text-secondary); margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .product-score { font-size:.65rem; color:var(--primary); background:#EEF1FF; border-radius:8px; padding:4px 8px; display:inline-block; }

  .typing-dots { display:flex; gap:4px; padding:12px 16px; align-items:center; }
  .typing-dots .d { width:7px;height:7px; border-radius:50%; background:var(--primary); animation:dotBounce 1.4s infinite ease-in-out both; }
  .d:nth-child(1){animation-delay:-.32s} .d:nth-child(2){animation-delay:-.16s} .d:nth-child(3){animation-delay:0s}
  @keyframes dotBounce { 0%,80%,100%{transform:scale(.4);opacity:.4} 40%{transform:scale(1);opacity:1} }

  .input-area { flex-shrink:0; padding:10px 12px 16px; background:linear-gradient(180deg,transparent,var(--bg) 30%); position:sticky; bottom:0; }
  .input-row { display:flex; gap:8px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-lg); padding:4px 4px 4px 16px; align-items:center; box-shadow:var(--shadow-md); transition:border-color .2s; }
  .input-row:focus-within { border-color:var(--primary); box-shadow:var(--shadow-lg); }
  .input-row input { flex:1; border:none; outline:none; font-size:.9rem; font-family:inherit; background:transparent; padding:10px 0; color:var(--text); }
  .input-row input::placeholder { color:var(--text-muted); }
  .btn-icon { width:40px;height:40px; border-radius:50%; border:none; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:transform .15s,box-shadow .15s; font-size:1.1rem; }
  .btn-send { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; }
  .btn-send:hover { transform:scale(1.05); box-shadow:0 4px 14px rgba(79,110,247,.35); }
  .btn-send:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-camera { background:#fff; color:var(--primary); border:1.5px solid var(--border); margin-right:4px; }
  .btn-camera:hover { border-color:var(--primary); }

  .status-bar { text-align:center; font-size:.65rem; color:var(--text-muted); margin-top:4px; }
  @media (max-width:480px) {
    .header { padding:10px 14px; } .header h1 { font-size:1.05rem; }
    .message { max-width:92%; } .product-card { min-width:140px; max-width:155px; }
    .bubble { font-size:.82rem; padding:10px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="dot"></div><h1>SearchEasy · AI导购</h1>
</div>

<div class="chat-container" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🛍️</div>
    <h3>你好，我是你的AI导购</h3>
    <p>告诉我你想买什么，或者上传商品图片，我帮你找到最合适的</p>
    <div class="quick-chips" style="margin-top:14px">
      <span class="quick-chip" onclick="send(this.textContent)">适合夏天穿的连衣裙</span>
      <span class="quick-chip" onclick="send(this.textContent)">送男朋友的生日礼物</span>
      <span class="quick-chip" onclick="send(this.textContent)">健身减脂吃的健康零食</span>
      <span class="quick-chip" onclick="send(this.textContent)">适合见家长的穿搭</span>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <button class="btn-icon btn-camera" onclick="document.getElementById('fileInput').click()" title="拍照搜索">📷</button>
    <input type="text" id="msgInput" placeholder="描述你的购物需求..." autocomplete="off" maxlength="500">
    <input type="file" id="fileInput" accept="image/*" hidden onchange="uploadImage(this)">
    <button class="btn-icon btn-send" id="btnSend" onclick="send()" aria-label="发送">➤</button>
  </div>
  <div class="status-bar" id="status"></div>
</div>

<script>
const API = 'https://yunyunwaifu-flora-ai-shop-agent.hf.space';
let loading = false;

function $(id){return document.getElementById(id)}
function time(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
function scroll(){const c=$('chat');c.scrollTo({top:c.scrollHeight,behavior:'smooth'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function addMsg(role, html){
  const el = document.createElement('div');
  el.className = 'message '+role;
  el.innerHTML = html;
  $('chat').appendChild(el);
  scroll();
}

function addUser(text){
  addMsg('user',`<div class="bubble">${esc(text)}</div><div class="message-time">${time()}</div>`);
}

function addLoading(){
  const el = document.createElement('div');
  el.className = 'message assistant';
  el.id = 'loadingMsg';
  el.innerHTML = '<div class="bubble"><div class="typing-dots"><div class="d"></div><div class="d"></div><div class="d"></div></div></div>';
  $('chat').appendChild(el);
  scroll();
}

function removeLoading(){
  const el = document.getElementById('loadingMsg');
  if(el) el.remove();
}

function addAI(reply, products){
  let cards = '';
  if(products && products.length){
    cards = '<div class="products-row">';
    products.forEach(p => {
      const img = p.image_url || 'https://placehold.co/400/EFF2FA/6B7280?text=商品';
      cards += `<div class="product-card">
        <img src="${esc(img)}" alt="${esc(p.name)}" loading="lazy" onerror="this.src='https://placehold.co/400/EFF2FA/6B7280?text=商品'">
        <div class="product-info">
          <div class="product-name">${esc(p.name)}</div>
          <div class="product-desc">${esc(p.description)}</div>
          ${p.score ? `<div class="product-score">匹配 ${(p.score*100).toFixed(0)}%</div>` : ''}
        </div>
      </div>`;
    });
    cards += '</div>';
  }
  addMsg('assistant',`<div class="bubble">${esc(reply)}${cards}</div><div class="message-time">${time()}</div>`);
}

async function send(text){
  const msg = text || $('msgInput').value.trim();
  if(!msg || loading) return;
  $('welcome').style.display = 'none';
  loading = true; $('btnSend').disabled = true;
  $('msgInput').value = '';
  addUser(msg);
  addLoading();

  try {
    const t0 = performance.now();
    const r = await fetch(API+'/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:msg})
    });
    const d = await r.json();
    const ms = Math.round(performance.now()-t0);
    removeLoading();
    if(r.ok){
      addAI(d.reply, d.products||[]);
      $('status').textContent = (d.source==='ai'?'AI ':'')+'推荐 · '+(d.elapsed_ms||ms)+'ms';
    } else {
      addAI('抱歉，出了点问题：'+ (d.detail||d.error||'请重试'), []);
    }
  } catch(e){
    removeLoading();
    addAI('网络连接失败，请确认后端服务已启动。', []);
  }
  loading = false; $('btnSend').disabled = false;
  $('msgInput').focus();
}

async function uploadImage(input){
  const file = input.files[0];
  if(!file || loading) return;
  $('welcome').style.display = 'none';
  loading = true;
  addUser('📷 上传了图片：'+file.name);
  addLoading();

  try {
    const fd = new FormData(); fd.append('file', file);
    const t0 = performance.now();
    const r = await fetch(API+'/api/agent/recommend', {method:'POST', body:fd});
    const d = await r.json();
    const ms = Math.round(performance.now()-t0);
    removeLoading();
    if(r.ok && d.recommendation_note){
      const products = (d.products||[]).map(p=>({
        name: p.label||p.image_path.split('/').pop(),
        description: '相似度 '+(p.similarity_score*100).toFixed(1)+'%',
        image_url: p.image_url||'',
        score: p.similarity_score
      }));
      addAI(d.recommendation_note, products);
      $('status').textContent = '图像搜索 · '+ms+'ms';
    } else {
      addAI('图片搜索失败，请重试。', []);
    }
  } catch(e){
    removeLoading();
    addAI('网络连接失败。', []);
  }
  loading = false; input.value = '';
}

$('msgInput').addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
$('msgInput').focus();

// Health check
(async function(){
  try {
    const r = await fetch(API+'/api/health');
    const d = await r.json();
    if(d.status==='ok') $('status').textContent = '已连接 · '+d.engine.total_images+' 件商品在线';
  } catch(e){ $('status').textContent = '离线模式'; }
})();
</script>
</body>
</html>
